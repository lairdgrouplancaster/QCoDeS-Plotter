name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: ${{ matrix.os }} Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025, macos-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run mypy
        run: python -m mypy

      - name: Run tests
        env:
          MPLCONFIGDIR: ${{ runner.temp }}/matplotlib
        run: python -m pytest

  package:
    name: Package build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Build source and wheel distributions
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qplot-distributions
          path: dist/*

  required-checks:
    name: Required checks
    runs-on: ubuntu-latest
    needs: [checks, package]
    if: always()

    steps:
      - name: Check matrix result
        run: |
          if [ "${{ needs.checks.result }}" != "success" ]; then
            echo "One or more matrix checks failed."
            exit 1
          fi
          if [ "${{ needs.package.result }}" != "success" ]; then
            echo "Package build failed."
            exit 1
          fi
          echo "All matrix checks passed."
